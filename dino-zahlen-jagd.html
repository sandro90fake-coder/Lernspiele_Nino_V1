<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathe-Spiele fur Kinder</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --dark:#080c14; --card:#111827; --card2:#1e2d45;
  --border:#1e3a5f; --text:#f0f6ff; --muted:#6b8299;
  --yellow:#ffd60a; --orange:#ff6b35; --red:#e63946;
  --green:#06d6a0; --blue:#4cc9f0; --purple:#a78bfa;
}

{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Nunito',sans-serif;
  background:var(--dark);
  color:var(--text);
  min-height:100vh;
}

/ Background /
.bg-road{
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    180deg,transparent 0,transparent 60px,
    rgba(255,255,255,.025) 60px, rgba(255,255,255,.025) 62px
  ), radial-gradient(ellipse 120% 60% at 50% 0%, #0d1f3c 0%, #080c14 70%);
  animation:roadScroll 8s linear infinite;
}
@keyframes roadScroll{
  from{background-position:0 0}
  to{background-position:0 120px}
}

/ Stars /
.stars{position:fixed;inset:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite alternate}
@keyframes twinkle{
  0%{opacity:.1;transform:scale(1)}
  100%{opacity:.6;transform:scale(1.4)}
}

/ Layout /
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px}

/ Hero /
.hero{text-align:center;margin-bottom:40px}
.hero-title{
  font-family:'Bangers',cursive;
  font-size:clamp(3rem,10vw,6rem);
}
.hero-title .accent{
  color:var(--yellow);
  text-shadow:4px 4px 0 rgba(230,57,70,.4);
}

/ Stats /
.stats-bar{
  display:flex;gap:20px;justify-content:center;
  padding:20px;background:var(--card);border-radius:12px;
  margin-bottom:40px
}
.stat-num{font-family:'Bangers';font-size:2rem;color:var(--yellow)}
.stat-lbl{font-size:.75rem;color:var(--muted);text-align:center}

/ Grid /
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/ Card /
.game-card{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:20px;
  padding:20px;
  text-decoration:none;
  color:inherit;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:.2s;
}
.game-card:hover{
  transform:translateY(-5px);
  border-color:var(--yellow);
}

.card-emoji{font-size:3rem}
.card-title{font-family:'Bangers';font-size:1.5rem}
.card-desc{font-size:.9rem;color:var(--muted)}

.card-meta{
  display:flex;
  justify-content:space-between;
  margin-top:auto;
}

button.back{
  margin-top:20px;
}

/ ripple */
.ripple-el{
  position:absolute;
  border-radius:50%;
  background:white;
  width:60px;height:60px;
  margin:-30px;
  animation:ripple .5s;
}
@keyframes ripple{
  from{transform:scale(0);opacity:.4}
  to{transform:scale(4);opacity:0}
}
</style>
</head>

<body>

<div class="bg-road"></div>
<div class="stars" id="stars"></div>

<div class="page">

<header class="hero">
  <h1 class="hero-title">
    Mathe <span class="accent">Arcade</span>
  </h1>
</header>

<!-- Stats -->
<div class="stats-bar">
  <div>
    <div class="stat-num">2</div>
    <div class="stat-lbl">Spiele</div>
  </div>
  <div>
    <div class="stat-num">10</div>
    <div class="stat-lbl">Level</div>
  </div>
  <div>
    <div class="stat-num">👶–👦</div>
    <div class="stat-lbl">Alter</div>
  </div>
</div>

<!-- Games -->
<div class="games-grid">

<!-- Auto Mathe -->
<a class="game-card" href="auto-mathe-rennen.html" onclick="addRipple(event)">
  <div class="card-emoji">🏎️</div>
  <div class="card-title">Auto Mathe-Rennen</div>
  <div class="card-desc">
    Rechne Aufgaben und upgrade dein Auto!
  </div>
  <div class="card-meta">
    <span>Alter 6+</span>
    <span>→</span>
  </div>
</a>

<!-- Dino Spiel -->
dino-zahlen-jagd.html
  <div class="card-emoji">🦕</div>
  <div class="card-title">Dino Zahlen-Jagd</div>
  <div class="card-desc">
    Zähle die Dinos und tippe die richtige Zahl – perfekt für kleine Kinder!
  </div>
  <div class="card-meta">
    <span>Alter 3+</span>
    <span>→</span>
  </div>
</a>

</div>

</div>

<script>
// stars
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<60;i++){
    var el=document.createElement('div');
    el.className='star';
    el.style.cssText=
      'width:'+(Math.random()*2)+'px;height:'+(Math.random()*2)+
      'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%';
    s.appendChild(el);
  }
})();

// ripple
function addRipple(e){
  var card=e.currentTarget;
  var rect=card.getBoundingClientRect();
  var el=document.createElement('div');
  el.className='ripple-el';
  el.style.left=(e.clientX-rect.left)+'px';
  el.style.top=(e.clientY-rect.top)+'px';
  card.appendChild(el);
  setTimeout(()=>el.remove(),500);
}
</script>

</body>
</html>
