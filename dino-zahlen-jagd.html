<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Zahlen-Jagd</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0d1f3c;
  color: white;
}

h1 { font-size: 3rem; }

#dinoArea {
  font-size: 4rem;
  margin: 30px 0;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

button {
  width: 80px;
  height: 80px;
  font-size: 2rem;
  border-radius: 15px;
  border: none;
  background: #06d6a0;
  cursor: pointer;
}

.feedback { font-size: 2rem; margin: 10px; }
</style>
</head>

<body>

<h1>🦕 Dino Zahlen-Jagd</h1>

<h2 id="level">Level 1</h2>
<h2 id="stage">🐣</h2>

<p>Zähle die Dinos!</p>

<div id="dinoArea"></div>

<div class="buttons" id="buttons"></div>

<div class="feedback" id="feedback"></div>
<div id="score">⭐ 0</div>

<br>
index.html⬅ Zurück</button>

<script>
let dinoCount = 0;
let level = 1;
let score = 0;
let correct = 0;

const stages = ["🐣","🐤","🦖","🦕","👑🦖"];

function createButtons(){
  const c = document.getElementById("buttons");
  for(let i=1;i<=6;i++){
    let b = document.createElement("button");
    b.textContent = i;
    b.onclick = ()=>check(i);
    c.appendChild(b);
  }
}

function newRound(){
  let area = document.getElementById("dinoArea");
  area.innerHTML = "";

  let max = level + 1;
  if(max > 6) max = 6;

  dinoCount = Math.floor(Math.random()*max)+1;

  for(let i=0;i<dinoCount;i++){
    let d = document.createElement("span");
    d.textContent = "🦖";
    d.style.margin = "5px";
    area.appendChild(d);
  }
}

function check(n){
  let f = document.getElementById("feedback");

  if(n === dinoCount){
    f.textContent = "✅ Super!";
    f.style.color = "lightgreen";

    score++;
    correct++;

    document.getElementById("score").textContent = "⭐ "+score;

    if(correct >= 3){
      level++;
      correct = 0;

      document.getElementById("level").textContent = "Level "+level;
      document.getElementById("stage").textContent =
        stages[Math.min(level-1, stages.length-1)];

      f.textContent = "🎉 Level Up!";
    }

    setTimeout(newRound,1000);

  } else {
    f.textContent = "❌ Nochmal!";
    f.style.color = "red";
  }
}

createButtons();
newRound();
</script>

</body>
</html>
