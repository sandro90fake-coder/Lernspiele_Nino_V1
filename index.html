<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Mario Kart Monster Truck</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

/* Strecke /
.track {
    width: 90%;
    height: 160px;
    background: #333;
    margin: 20px auto;
    border-radius: 15px;
    position: relative;
}

/ Trucks /
.player {
    position: absolute;
    left: 0px;
    top: 20px;
    font-size: 60px;
}

.enemy {
    position: absolute;
    left: 0px;
    top: 90px;
    font-size: 50px;
}

/ Ziel /
.finish {
    position: absolute;
    right: 10px;
    top: 50px;
    font-size: 30px;
}

/ Item Box /
.item {
    position: absolute;
    top: 60px;
    font-size: 35px;
}

/ UI */
button {
    font-size: 22px;
    margin: 8px;
    padding: 12px;
}
</style>

</head>

<body>

<h1>🚜💥 Ninos Mario Kart Rennen 🏁</h1>

<!-- LEVEL -->
<div id="menu">
    <button onclick="startLevel(1)">Level 1</button>
    <button onclick="startLevel(2)">Level 2</button>
    <button onclick="startLevel(3)">Level 3</button>
</div>

<div id="game" style="display:none;">

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div id="item" class="item">🎁</div>
    <div class="finish">🏁</div>
</div>

<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<p>🔥 Combo: <span id="combo">0</span></p>

<button onclick="back()">⬅ Menü</button>

</div>

<script>

var correct = 0;
var playerPos = 0;
var enemyPos = 0;
var combo = 0;
var level = 1;
var enemySpeed = 2;

// START LEVEL
function startLevel(l) {
    level = l;

    if (level === 1) enemySpeed = 1.5;
    if (level === 2) enemySpeed = 2.5;
    if (level === 3) enemySpeed = 3.5;

    playerPos = 0;
    enemyPos = 0;
    combo = 0;

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    moveItem(); // neues Item platzieren
    updatePositions();
    newQuestion();
}

// Menü
function back() {
    document.getElementById("game").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

// Gegner Bewegung
setInterval(function() {
    enemyPos += enemySpeed;
    updatePositions();

    if (enemyPos >= 300) {
        document.getElementById("feedback").innerText = "😱 Gegner gewinnt!";
        reset();
    }
}, 800);

// Item positionieren
function moveItem() {
    var randomPos = Math.random() * 250;
    document.getElementById("item").style.left = randomPos + "px";
}

// Position anwenden
function updatePositions() {
    document.getElementById("player").style.left = playerPos + "px";
    document.getElementById("enemy").style.left = enemyPos + "px";

    checkItemCollision();
}

// Item prüfen
function checkItemCollision() {
    var item = document.getElementById("item");

    var itemPos = item.offsetLeft;

    // Spieler sammelt Item
    if (Math.abs(playerPos - itemPos) < 20) {
        useItem();
        moveItem();
    }
}

// ITEM SYSTEM
function useItem() {

    var r = Math.random();

    // 🚀 TURBO
    if (r < 0.33) {
        playerPos += 50;
        document.getElementById("feedback").innerText = "🚀 TURBO ITEM!";
    }

    // 🐌 Gegner langsamer
    else if (r < 0.66) {
        enemySpeed = 1;
        document.getElementById("feedback").innerText = "🐌 Gegner langsam!";
    }

    // 💥 SUPER BOOST
    else {
        playerPos += 80;
        document.getElementById("feedback").innerText = "💥 MEGA BOOST!";
    }

    updatePositions();
}

// Aufgabe
function newQuestion() {

    var max = 5 + level * 5;

    var a = Math.floor(Math.random()*max);
    var b = Math.floor(Math.random()*max);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [];
    answers.push(correct);

    while (answers.length < 4) {
        var wrong = correct + Math.floor(Math.random()*6) - 3;
        if (wrong >= 0 && answers.indexOf(wrong) === -1) {
            answers.push(wrong);
        }
    }

    answers.sort(function(){ return Math.random() - 0.5; });

    var container = document.getElementById("answers");
    container.innerHTML = "";

    for (var i = 0; i < answers.length; i++) {
        var btn = document.createElement("button");
        btn.innerText = answers[i];

        btn.onclick = (function(value){
            return function(){
                check(value);
            };
        })(answers[i]);

        container.appendChild(btn);
    }
}

// Antwort
function check(value) {

    if (value === correct) {

        combo++;
        playerPos += 30;

        document.getElementById("feedback").innerText = "✅ Richtig!";

        if (combo >= 3) {
            playerPos += 50;
            document.getElementById("feedback").innerText = "🚀 TURBO!";
            combo = 0;
        }

        if (playerPos >= 300) {
            document.getElementById("feedback").innerText = "🏆 Nino gewinnt!";
            reset();
        }

    } else {
        combo = 0;
        document.getElementById("feedback").innerText = "❌ Falsch!";
    }

    document.getElementById("combo").innerText = combo;

    updatePositions();

    setTimeout(newQuestion, 800);
}

// Reset
function reset() {
    playerPos = 0;
    enemyPos = 0;
    combo = 0;
    moveItem();

    updatePositions();
}

</script>

</body>
</html>
