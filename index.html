<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Spiel</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    overflow:hidden;

    /* Himmel /
    background: linear-gradient(#4facfe, #87CEEB);
}

/ Hügel /
.hills {
    position: fixed;
    bottom:200px;
    width:100%;
    height:150px;

    background:
        radial-gradient(circle at 30% 100%, #2ecc71 60%, transparent 61%),
        radial-gradient(circle at 70% 100%, #27ae60 60%, transparent 61%);
}

/ Straße /
.track {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 200px;
    background: #2c2c2c;
}

/ Mittellinie /
.track:after {
    content:"";
    position:absolute;
    top:50%;
    width:100%;
    height:6px;

    background: repeating-linear-gradient(
        90deg,
        white 0px,
        white 20px,
        transparent 20px,
        transparent 40px
    );
}

/ Ziel /
.finish {
    position:absolute;
    right:20px;
    top:0;
    height:100%;
    width:20px;

    background: repeating-linear-gradient(
        45deg,
        white 0px,
        white 5px,
        black 5px,
        black 10px
    );
}

/ Fahrzeuge /
.player {
    position:absolute;
    bottom:120px;
    left:0px;
    font-size:70px;
}

.enemy {
    position:absolute;
    bottom:60px;
    left:0px;
    font-size:60px;
}

/ UI */
#question {
    font-size:50px;
    font-weight:bold;
}

button {
    font-size:22px;
    margin:5px;
    padding:10px;
}
</style>

</head>

<body>

<div class="hills"></div>

<!-- MENU -->
<div id="menu">
    <h2>🚜 Ninos Spiel</h2>

    <button onclick="startLevel(1)">⭐ Level 1</button>
    <button onclick="startLevel(2)">🏁 Level 2</button>
    <button onclick="startLevel(3)">🔥 Level 3</button>

    <h3>Fahrzeuge</h3>
    <div id="cars"></div>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>

    <div class="track">
        <div class="finish"></div>
    </div>

    <p id="question"></p>
    <div id="answers"></div>
    <p id="feedback"></p>
    <p id="stars"></p>

    <button onclick="goMenu()">⬅ Menü</button>

</div>

<script>

// Speicher
var unlockedCars = JSON.parse(localStorage.getItem("cars") || '["🚜"]');
var currentCar = unlockedCars[0];

// Spiel
var correct, level=1, stars=0;
var playerPos=0, enemyPos=0;
var enemySpeed=2;

// speichern
function saveData(){
    localStorage.setItem("cars", JSON.stringify(unlockedCars));
}

// Fahrzeuge anzeigen
function renderCars(){
    var div = document.getElementById("cars");
    div.innerHTML="";

    for(var i=0;i<unlockedCars.length;i++){
        var btn = document.createElement("button");
        btn.innerText = unlockedCars[i];

        btn.onclick = (function(car){
            return function(){
                currentCar = car;
            };
        })(unlockedCars[i]);

        div.appendChild(btn);
    }
}
renderCars();

// Level starten
function startLevel(l){
    level = l;
    playerPos=0;
    enemyPos=0;
    stars=0;

    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    document.getElementById("player").innerText=currentCar;

    if(level==1){
        document.getElementById("enemy").style.display="none";
    } else {
        document.getElementById("enemy").style.display="block";
    }

    newQuestion();
}

// Bewegung
setInterval(function(){

    if(level>1){
        enemyPos += enemySpeed;
        document.getElementById("enemy").style.left = enemyPos + "px";

        if(enemyPos > window.innerWidth-100){
            document.getElementById("feedback").innerText="😱 Gegner gewinnt!";
            reset();
        }
    }

    document.getElementById("player").style.left = playerPos + "px";

},100);

// Frage
function newQuestion(){

    var a = Math.floor(Math.random()*10);
    var b = Math.floor(Math.random()*10);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers=[correct];

    while(answers.length<4){
        var w = correct + Math.floor(Math.random()*6)-3;
        if(w>=0 && answers.indexOf(w)==-1){
            answers.push(w);
        }
    }

    answers.sort(function(){ return Math.random()-0.5; });

    var box = document.getElementById("answers");
    box.innerHTML="";

    for(var i=0;i<answers.length;i++){

        var btn=document.createElement("button");
        btn.innerText=answers[i];

        btn.onclick=(function(val){
            return function(){
                check(val);
            };
        })(answers[i]);

        box.appendChild(btn);
    }
}

// Check
function check(v){

    if(v==correct){

        if(level==1){
            stars++;
            document.getElementById("stars").innerText="⭐ "+stars;

            if(stars==5){
                unlockCar("🚙");
                document.getElementById("feedback").innerText="🏆 Super!";
            }

        } else {

            playerPos += 40;

            if(playerPos > window.innerWidth-150){
                unlockCar("🚓");
                document.getElementById("feedback").innerText="🏆 Gewonnen!";
                reset();
            }
        }

    } else {
        document.getElementById("feedback").innerText="😅 Versuch nochmal!";
    }

    setTimeout(newQuestion,800);
}

// freischalten
function unlockCar(car){
    if(unlockedCars.indexOf(car)==-1){
        unlockedCars.push(car);
        renderCars();
        saveData();
        document.getElementById("feedback").innerText="🎁 Neues Fahrzeug!";
    }
}

// reset
function reset(){
    playerPos=0;
    enemyPos=0;
}

// zurück
function goMenu(){
    document.getElementById("game").style.display="none";
    document.getElementById("menu").style.display="block";
}

</script>

</body>
</html>
