<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Level Rennen</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

/* Strecke /
.track {
    width: 90%;
    height: 160px;
    background: #333;
    margin: 20px auto;
    border-radius: 15px;
    position: relative;
}

.player {
    position: absolute;
    left: 0px;
    top: 20px;
    font-size: 60px;
}

.enemy {
    position: absolute;
    left: 0px;
    top: 90px;
    font-size: 50px;
}

.finish {
    position: absolute;
    right: 10px;
    top: 50px;
    font-size: 30px;
}

/ Buttons /
button {
    font-size: 22px;
    margin: 8px;
    padding: 12px;
}

/ Map */
.hidden {
    display:none;
}
</style>
</head>

<body>

<h1>🚜 Ninos Monster Truck Rennen 🏁</h1>

<!-- LEVEL AUSWAHL -->
<div id="menu">
    <h2>Wähle ein Level</h2>
    <button onclick="startLevel(1)">Level 1 (leicht)</button>
    <button onclick="startLevel(2)">Level 2 (mittel)</button>
    <button onclick="startLevel(3)">Level 3 (schwer)</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div class="finish">🏁</div>
</div>

<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<p>🔥 Combo: <span id="combo">0</span></p>

<button onclick="backToMenu()">⬅ Menü</button>

</div>

<script>

var correct = 0;
var playerPos = 0;
var enemyPos = 0;
var combo = 0;
var level = 1;
var enemySpeed = 2;

// LEVEL START
function startLevel(l) {
    level = l;

    // Schwierigkeit
    if (level === 1) enemySpeed = 1.5;
    if (level === 2) enemySpeed = 2.5;
    if (level === 3) enemySpeed = 3.5;

    playerPos = 0;
    enemyPos = 0;
    combo = 0;

    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    updatePositions();
    newQuestion();
}

// Zurück
function backToMenu() {
    document.getElementById("game").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

// Gegner Bewegung
function moveEnemy() {
    enemyPos += enemySpeed;

    updatePositions();

    if (enemyPos >= 300) {
        document.getElementById("feedback").innerText = "😱 Gegner gewinnt!";
        resetGame();
    }
}

setInterval(moveEnemy, 800);

// Position anwenden
function updatePositions() {
    document.getElementById("player").style.left = playerPos + "px";
    document.getElementById("enemy").style.left = enemyPos + "px";
}

// Aufgabe
function newQuestion() {
    var max = 5 + level * 5;

    var a = Math.floor(Math.random() * max);
    var b = Math.floor(Math.random() * max);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [];
    answers.push(correct);

    while (answers.length < 4) {
        var wrong = correct + Math.floor(Math.random()*6) - 3;
        if (wrong >= 0 && answers.indexOf(wrong) === -1) {
            answers.push(wrong);
        }
    }

    answers.sort(function(){ return Math.random() - 0.5; });

    var container = document.getElementById("answers");
    container.innerHTML = "";

    for (var i = 0; i < answers.length; i++) {
        var btn = document.createElement("button");
        btn.innerText = answers[i];

        btn.onclick = (function(value){
            return function(){
                check(value);
            };
        })(answers[i]);

        container.appendChild(btn);
    }
}

// Antwort prüfen
function check(value) {

    if (value === correct) {

        combo++;
        playerPos += 30;

        document.getElementById("feedback").innerText = "✅ Richtig!";

        // Turbo
        if (combo >= 3) {
            playerPos += 50;
            document.getElementById("feedback").innerText = "🚀 TURBO!";
            combo = 0;
        }

        // Sieg
        if (playerPos >= 300) {
            document.getElementById("feedback").innerText = "🏆 Nino gewinnt!";
            resetGame();
        }

    } else {
        combo = 0;
        document.getElementById("feedback").innerText = "❌ Falsch!";
    }

    document.getElementById("combo").innerText = combo;

    updatePositions();

    setTimeout(newQuestion, 800);
}

// Reset
function resetGame() {
    playerPos = 0;
    enemyPos = 0;
    combo = 0;

    updatePositions();
}

</script>

</body>
</html>
