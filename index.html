<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Rennen</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

.track {
    width: 90%;
    height: 150px;
    background: #333;
    margin: 20px auto;
    border-radius: 15px;
    position: relative;
}

.player {
    position: absolute;
    left: 0%;
    top: 20px;
    font-size: 60px;
}

.enemy {
    position: absolute;
    left: 0%;
    top: 80px;
    font-size: 50px;
}

.finish {
    position: absolute;
    right: 10px;
    top: 50px;
    font-size: 30px;
}

button {
    font-size: 22px;
    margin: 8px;
    padding: 12px;
}
</style>

</head>

<body>

<h1>🚜 Ninos Monster Truck Rennen 🏁</h1>

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div class="finish">🏁</div>
</div>

<p id="question">Start...</p>
<div id="answers"></div>
<p id="feedback"></p>
<p>Combo: <span id="combo">0</span></p>

<script>

var correct = 0;
var playerPos = 0;
var enemyPos = 0;
var combo = 0;

// Gegner bewegt sich automatisch
function moveEnemy() {
    enemyPos = enemyPos + Math.random() * 2;
    document.getElementById("enemy").style.left = enemyPos + "%";

    if (enemyPos >= 80) {
        document.getElementById("feedback").innerText = "😱 Gegner gewinnt!";
        resetGame();
    }
}

setInterval(moveEnemy, 1000);

function newQuestion() {

    var a = Math.floor(Math.random() * 10);
    var b = Math.floor(Math.random() * 10);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [];
    answers.push(correct);

    while (answers.length < 4) {
        var wrong = correct + Math.floor(Math.random()*6) - 3;

        if (wrong >= 0 && answers.indexOf(wrong) === -1) {
            answers.push(wrong);
        }
    }

    // mischen
    answers.sort(function(){ return Math.random() - 0.5; });

    var container = document.getElementById("answers");
    container.innerHTML = "";

    for (var i = 0; i < answers.length; i++) {
        var btn = document.createElement("button");
        btn.innerText = answers[i];

        btn.onclick = (function(value) {
            return function() {
                check(value);
            };
        })(answers[i]);

        container.appendChild(btn);
    }
}

function check(value) {

    if (value === correct) {

        combo = combo + 1;
        playerPos = playerPos + 10;

        document.getElementById("feedback").innerText = "✅ Richtig!";
        document.getElementById("player").style.left = playerPos + "%";

        // Turbo
        if (combo >= 3) {
            playerPos = playerPos + 15;
            document.getElementById("feedback").innerText = "🚀 TURBO!";
            combo = 0;
        }

        // Sieg
        if (playerPos >= 80) {
            document.getElementById("feedback").innerText = "🏆 Nino gewinnt!";
            resetGame();
        }

    } else {
        combo = 0;
        document.getElementById("feedback").innerText = "❌ Falsch!";
    }

    document.getElementById("combo").innerText = combo;

    setTimeout(newQuestion, 800);
}

function resetGame() {
    playerPos = 0;
    enemyPos = 0;
    combo = 0;

    document.getElementById("player").style.left = "0%";
    document.getElementById("enemy").style.left = "0%";
}

newQuestion();

</script>

</body>
</html>
