<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Spiel</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

.hidden { display:none; }

button {
    font-size: 22px;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}

.truck {
    font-size: 60px;
    margin: 20px;
}
</style>

</head>

<body>

<h1>🚚 Ninos Spiel</h1>

<div id="map">
    <h2>Level wählen</h2>
    <button onclick="startLevel(1)">🌵 Wüste</button>
    <button onclick="startLevel(2)">🏔️ Berge</button>
    <button onclick="startLevel(3)">🌋 Vulkan</button>
</div>

<div id="game" class="hidden">
    <div class="truck" id="truck">🚚</div>
    <p id="question"></p>
    <div id="answers"></div>
    <p id="feedback"></p>
    <button onclick="back()">Zurück</button>
</div>

<script>
let correctAnswer = 0;

function startLevel(level) {
    document.getElementById("map").style.display = "none";
    document.getElementById("game").style.display = "block";
    newQuestion();
}

function back() {
    document.getElementById("game").style.display = "none";
    document.getElementById("map").style.display = "block";
}

function newQuestion() {
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);

    correctAnswer = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    let answersSet = new Set();
    answersSet.add(correctAnswer);

    while (answersSet.size < 4) {
        let wrong = correctAnswer + Math.floor(Math.random()*6)-3;
        if (wrong >= 0) {
            answersSet.add(wrong);
        }
    }

    let answers = Array.from(answersSet).sort(() => Math.random()-0.5);

    let container = document.getElementById("answers");
    container.innerHTML = "";

    answers.forEach(value => {
        let btn = document.createElement("button");
        btn.innerText = value;
        btn.onclick = function() {
            if (value === correctAnswer) {
                document.getElementById("feedback").innerText = "✅ Super Nino!";
            } else {
                document.getElementById("feedback").innerText = "❌ Versuch nochmal!";
            }
            setTimeout(newQuestion, 1000);
        };
        container.appendChild(btn);
    });
}
</script>

</body>
</html>
