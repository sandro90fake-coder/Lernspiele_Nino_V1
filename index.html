<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Rennen</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

.track {
    width: 90%;
    height: 180px;
    background: #333;
    margin: 20px auto;
    border-radius: 20px;
    position: relative;
}

.player {
    position: absolute;
    left: 0px;
    top: 20px;
    font-size: 80px;
}

.enemy {
    position: absolute;
    left: 0px;
    top: 100px;
    font-size: 70px;
}

.finish {
    position: absolute;
    right: 10px;
    top: 60px;
    font-size: 40px;
}

.item {
    position: absolute;
    top: 70px;
    font-size: 40px;
}

#question {
    font-size: 60px;
    font-weight: bold;
}

button {
    font-size: 28px;
    margin: 10px;
    padding: 15px;
}
</style>

</head>

<body>

<h1>🚜💥 Ninos Rennen 🏁</h1>

<div id="menu">
    <button onclick="startLevel(1)">Level 1</button>
    <button onclick="startLevel(2)">Level 2</button>
    <button onclick="startLevel(3)">Level 3</button>
</div>

<div id="game" style="display:none;">

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div id="item" class="item">🎁</div>
    <div class="finish">🏁</div>
</div>

<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>

<button onclick="location.reload()">⬅ Menü</button>

</div>

<script>

var correct = 0;
var playerPos = 0;
var enemyPos = 0;
var level = 1;
var enemySpeed = 2;

// ✅ STABILER GAME LOOP
setInterval(function() {

    enemyPos += enemySpeed;

    document.getElementById("enemy").style.left = enemyPos + "px";
    document.getElementById("player").style.left = playerPos + "px";

    checkItem();

    if (enemyPos > 300) {
        document.getElementById("feedback").innerText = "😱 Gegner gewinnt!";
        resetGame();
    }

}, 100); // läuft 10x pro Sekunde

function startLevel(l) {

    level = l;

    if (level === 1) enemySpeed = 1.5;
    if (level === 2) enemySpeed = 2.5;
    if (level === 3) enemySpeed = 4;

    playerPos = 0;
    enemyPos = 0;

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    moveItem();
    newQuestion();
}

function moveItem() {
    var pos = Math.random() * 250;
    document.getElementById("item").style.left = pos + "px";
}

function checkItem() {
    var itemPos = document.getElementById("item").offsetLeft;

    if (Math.abs(playerPos - itemPos) < 30) {
        useItem();
        moveItem();
    }
}

function useItem() {

    var r = Math.random();

    if (r < 0.33) {
        playerPos += 60;
        document.getElementById("feedback").innerText = "🚀 Turbo!";
    }
    else if (r < 0.66) {
        enemySpeed = enemySpeed * 0.5;
        document.getElementById("feedback").innerText = "🐌 Gegner langsam!";
    }
    else {
        playerPos += 100;
        document.getElementById("feedback").innerText = "💥 Mega Boost!";
    }
}

function newQuestion() {

    var max = 5 + level * 5;

    var a = Math.floor(Math.random()*max);
    var b = Math.floor(Math.random()*max);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [correct];

    while (answers.length < 4) {
        var wrong = correct + Math.floor(Math.random()*6)-3;
        if (wrong >= 0 && !answers.includes(wrong)) {
            answers.push(wrong);
        }
    }

    answers.sort(function(){ return Math.random() - 0.5; });

    var box = document.getElementById("answers");
    box.innerHTML = "";

    for (var i=0;i<answers.length;i++) {

        var btn = document.createElement("button");
        btn.innerText = answers[i];

        btn.onclick = (function(v){
            return function(){
                check(v);
            };
        })(answers[i]);

        box.appendChild(btn);
    }
}

function check(v) {

    if (v === correct) {
        playerPos += 30;
        document.getElementById("feedback").innerText = "🎉 Super Nino!";
    } else {
        document.getElementById("feedback").innerText = "😅 Versuch nochmal!";
    }

    if (playerPos > 300) {
        document.getElementById("feedback").innerText = "🏆 Gewonnen!";
        resetGame();
    }

    setTimeout(newQuestion, 800);
}

function resetGame() {
    playerPos = 0;
    enemyPos = 0;
    moveItem();
}

</script>

</body>
</html>
