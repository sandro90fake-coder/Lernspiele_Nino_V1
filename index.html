<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Spiel</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

.hidden { display:none; }

button {
    font-size: 22px;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}

.truck {
    font-size: 60px;
    margin: 20px;
}
</style>

</head>

<body>

<h1>🚚 Ninos Spiel</h1>

<div id="map">
    <h2>Level wählen</h2>
    <button onclick="startLevel(1)">Level 1</button>
    <button onclick="startLevel(2)">Level 2</button>
</div>

<div id="game" class="hidden">
    <div class="truck">🚚</div>
    <p id="question"></p>
    <div id="answers"></div>
    <p id="feedback"></p>
    <button onclick="back()">Zurück</button>
</div>

<script>
let correct = 0;

function startLevel(l) {
    document.getElementById("map").style.display = "none";
    document.getElementById("game").style.display = "block";
    newQuestion();
}

function back() {
    document.getElementById("game").style.display = "none";
    document.getElementById("map").style.display = "block";
}

function newQuestion() {
    let a = Math.floor(Math.random()*5);
    let b = Math.floor(Math.random()*5);
    correct = a + b;

    document.getElementById("question").innerText = a + " + " + b;

    let answers = document.getElementById("answers");
    answers.innerHTML = "";

    for(let i=0;i<3;i++) {
        let value;
        if(i===0) {
            value = correct;
        } else {
            value = correct + Math.floor(Math.random()*3)-1;
        }

        let btn = document.createElement("button");
        btn.innerText = value;
        btn.onclick = function() {
            if(value === correct) {
                document.getElementById("feedback").innerText = "✅ Super!";
            } else {
                document.getElementById("feedback").innerText = "❌ Versuch nochmal!";
            }
            setTimeout(newQuestion,1000);
        };

        answers.appendChild(btn);
    }
}
</script>

</body>
</html>
