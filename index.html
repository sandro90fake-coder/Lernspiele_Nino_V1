<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Rennen</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#4facfe, #00f2fe);
    color: white;
}

/* Strecke /
.track {
    width: 90%;
    height: 160px;
    background: #444;
    margin: 20px auto;
    border-radius: 20px;
    position: relative;
}

/ Spieler Truck /
.player {
    position: absolute;
    left: 0;
    top: 20px;
    font-size: 70px;
    transition: left 0.3s;
}

/ Gegner /
.enemy {
    position: absolute;
    left: 0;
    top: 90px;
    font-size: 60px;
    transition: left 0.3s;
}

/ Ziel /
.finish {
    position:absolute;
    right:10px;
    top:50px;
    font-size:40px;
}

/ UI /
button {
    font-size: 22px;
    margin: 8px;
    padding: 12px;
    border-radius: 12px;
}

/ Turbo Effekt */
.turbo {
    transform: scale(1.3);
    filter: drop-shadow(0 0 10px yellow);
}
</style>

</head>

<body>

<h1>🚜💥 Ninos Monster Truck Rennen 🏁</h1>

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div class="finish">🏁</div>
</div>

<p id="question">Lade...</p>
<div id="answers"></div>
<p id="feedback"></p>
<p>🔥 Combo: <span id="combo">0</span></p>

<script>

let correctAnswer = 0;
let combo = 0;

let playerPos = 0;
let enemyPos = 0;

// Gegner fährt automatisch
setInterval(() => {
    enemyPos += Math.random() * 3; // langsamer als Spieler

    document.getElementById("enemy").style.left = enemyPos + "%";

    // Gegner gewinnt
    if (enemyPos >= 80) {
        document.getElementById("feedback").innerText =
            "😱 Der Gegner hat gewonnen! Noch mal!";
        resetGame();
    }

}, 800);

function newQuestion() {

    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);

    correctAnswer = a + b;

    document.getElementById("question").innerText =
        ${a} + ${b} = ?;

    let answers = [];
    answers.push(correctAnswer);

    while (answers.length < 4) {
        let wrong = correctAnswer + Math.floor(Math.random()*6)-3;
        if (wrong >= 0 && !answers.includes(wrong)) {
            answers.push(wrong);
        }
    }

    answers.sort(() => Math.random()-0.5);

    let container = document.getElementById("answers");
    container.innerHTML = "";

    answers.forEach(value => {
        let btn = document.createElement("button");
        btn.innerText = value;
        btn.onclick = function() {
            checkAnswer(value);
        };
        container.appendChild(btn);
    });
}

function checkAnswer(value) {

    let player = document.getElementById("player");

    if (value === correctAnswer) {

        combo++;
        playerPos += 8;

        document.getElementById("feedback").innerText = "✅ Super Nino!";

        player.style.left = playerPos + "%";

        // TURBO
        if (combo >= 3) {
            playerPos += 15;
            document.getElementById("feedback").innerText = "🚀 TURBO BOOST!";
            
            player.classList.add("turbo");

            setTimeout(() => {
                player.classList.remove("turbo");
            }, 500);

            combo = 0;
        }

        // Spieler gewinnt
        if (playerPos >= 80) {
            document.getElementById("feedback").innerText =
                "🏆 NINO GEWINNT!!! 🚜💥";
            resetGame();
        }

    } else {
        combo = 0;
        document.getElementById("feedback").innerText = "😅 Falsch!";
    }

    document.getElementById("combo").innerText = combo;

    setTimeout(newQuestion, 800);
}

function resetGame() {
    playerPos = 0;
    enemyPos = 0;
    combo = 0;

    document.getElementById("player").style.left = "0%";
    document.getElementById("enemy").style.left = "0%";
}

newQuestion();

</script>

</body>
</html>
