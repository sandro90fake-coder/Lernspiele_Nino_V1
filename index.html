<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Abenteuer</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#4facfe, #00f2fe);
    color: white;
}

.hidden { display:none; }

/* Map Buttons /
.map button {
    margin: 10px;
    padding: 20px;
    font-size: 22px;
    border-radius: 12px;
    border: none;
    background: orange;
    color: white;
}

/ Game Box /
.game-box {
    background: rgba(0,0,0,0.4);
    margin: 20px auto;
    padding: 20px;
    width: 300px;
    border-radius: 20px;
}

/ Truck /
.truck {
    font-size: 70px;
    transition: transform 0.3s, filter 0.3s;
}

.jump {
    transform: translateY(-30px);
}

/ TURBO Effekt /
.turbo {
    transform: scale(1.3);
    filter: drop-shadow(0 0 15px yellow);
}

/ Antworten /
button.answer {
    font-size: 24px;
    margin: 10px;
    padding: 15px;
    width: 90px;
    border-radius: 12px;
}

/ Sterne */
.star {
    position: absolute;
    font-size: 30px;
    animation: fly 1s forwards;
}

@keyframes fly {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-150px); opacity:0; }
}
</style>

</head>

<body>

<h1>🚚 Ninos Monster Truck Abenteuer 🏁</h1>

<!-- MAP -->
<div id="map">
    <h2>Wähle dein Level, Nino!</h2>
    <div class="map">
        <button onclick="startLevel(1)">🌵 Wüste</button>
        <button onclick="startLevel(2)">🏔️ Berge</button>
        <button onclick="startLevel(3)">🌋 Vulkan</button>
    </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">

    <div class="truck" id="truck">🚚</div>

    <div class="game-box">
        <p id="question"></p>
        <div id="answers"></div>
        <p id="feedback"></p>
        <p>⭐ Sterne: <span id="stars">0</span></p>
        <p>🔥 Combo: <span id="combo">0</span></p>
    </div>

    <button onclick="backToMap()">⬅ Zurück</button>
</div>

<script>
let level = 1;
let stars = 0;
let correctAnswer = 0;
let combo = 0;

function startLevel(l) {
    level = l;
    stars = 0;
    combo = 0;

    document.getElementById("map").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    updateUI();
    newQuestion();
}

function backToMap() {
    document.getElementById("game").classList.add("hidden");
    document.getElementById("map").classList.remove("hidden");
}

function updateUI() {
    document.getElementById("stars").innerText = stars;
    document.getElementById("combo").innerText = combo;
}

function newQuestion() {
    let max = level * 5;
    let a = Math.floor(Math.random() * max);
    let b = Math.floor(Math.random() * max);

    correctAnswer = a + b;

    document.getElementById("question").innerText =
        Nino, wie viel ist ${a} + ${b}?;

    let answers = new Set();
    answers.add(correctAnswer);

    while (answers.size < 4) {
        let wrong = correctAnswer + Math.floor(Math.random()*6)-3;
        if (wrong >= 0) answers.add(wrong);
    }

    let finalAnswers = Array.from(answers).sort(() => Math.random() - 0.5);

    let container = document.getElementById("answers");
    container.innerHTML = "";

    finalAnswers.forEach(value => {
        let btn = document.createElement("button");
        btn.className = "answer";
        btn.innerText = value;
        btn.onclick = () => checkAnswer(value);
        container.appendChild(btn);
    });
}

function checkAnswer(answer) {

    let feedback = document.getElementById("feedback");
    let truck = document.getElementById("truck");

    if (answer === correctAnswer) {

        combo++;
        stars++;

        feedback.innerText = "🎉 SUPER Nino!";
        truck.classList.add("jump");

        setTimeout(() => truck.classList.remove("jump"), 300);

        createStar();

        // 🚀 TURBO BOOST
        if (combo >= 3) {
            stars += 2; // Extra Sterne!
            feedback.innerText = "🚀 TURBO BOOST!!! 🔥🔥🔥";

            truck.classList.add("turbo");

            setTimeout(() => truck.classList.remove("turbo"), 800);

            combo = 0;
        }

    } else {
        feedback.innerText = "😅 Fast – nochmal!";
        combo = 0;
    }

    updateUI();

    setTimeout(newQuestion, 1200);
}

function createStar() {
    let star = document.createElement("div");
    star.innerText = "⭐";
    star.classList.add("star");

    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = "300px";

    document.body.appendChild(star);

    setTimeout(() => star.remove(), 1000);
}
</script>

</body>
</html>
