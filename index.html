<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Spiel</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#4facfe, #00f2fe);
    color: white;
}

/* Strecke /
.track {
    width: 90%;
    height: 180px;
    background: #333;
    margin: 20px auto;
    border-radius: 20px;
    position: relative;
}

/ Trucks /
.player {
    position: absolute;
    left: 0px;
    top: 20px;
    font-size: 80px;
}

.enemy {
    position: absolute;
    left: 0px;
    top: 100px;
    font-size: 70px;
}

/ Ziel /
.finish {
    position: absolute;
    right: 10px;
    top: 60px;
    font-size: 40px;
}

/ Item /
.item {
    position: absolute;
    top: 70px;
    font-size: 40px;
}

/ Frage (RIESIG) /
#question {
    font-size: 60px;
    font-weight: bold;
    margin: 20px;
}

/ Buttons /
button {
    font-size: 28px;
    margin: 10px;
    padding: 20px;
    border-radius: 15px;
    border: none;
    color: white;
    background: orange;
}

button:hover {
    background: red;
}

/ Menü Buttons /
.menu button {
    background: green;
}

/ Feedback /
#feedback {
    font-size: 28px;
    margin: 10px;
}

/ Combo */
#combo {
    font-size: 28px;
}
</style>

</head>

<body>

<h1>🚜💥 Ninos Monster Truck Rennen 🏁</h1>

<!-- Menü -->
<div id="menu" class="menu">
    <h2>Wähl ein Level, Nino!</h2>
    <button onclick="startLevel(1)">🌵 leicht</button>
    <button onclick="startLevel(2)">🏔️ mittel</button>
    <button onclick="startLevel(3)">🌋 schwer</button>
</div>

<!-- Spiel -->
<div id="game" style="display:none;">

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div id="item" class="item">🎁</div>
    <div class="finish">🏁</div>
</div>

<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<p>🔥 Combo: <span id="combo">0</span></p>

<button onclick="back()">⬅ Zurück</button>

</div>

<script>

var correct = 0;
var playerPos = 0;
var enemyPos = 0;
var combo = 0;
var level = 1;
var enemySpeed = 2;

// Start Level
function startLevel(l) {

    level = l;

    if (level === 1) enemySpeed = 1.5;
    if (level === 2) enemySpeed = 2.5;
    if (level === 3) enemySpeed = 3.5;

    playerPos = 0;
    enemyPos = 0;
    combo = 0;

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    moveItem();
    updatePositions();
    newQuestion();
}

// zurück
function back() {
    document.getElementById("game").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

// Gegner fährt
setInterval(function() {
    enemyPos += enemySpeed;
    updatePositions();

    if (enemyPos >= 300) {
        document.getElementById("feedback").innerText = "😱 Der Gegner war schneller!";
        reset();
    }
}, 800);

// Positionen
function updatePositions() {
    document.getElementById("player").style.left = playerPos + "px";
    document.getElementById("enemy").style.left = enemyPos + "px";

    checkItem();
}

// Item platzieren
function moveItem() {
    var pos = Math.random() * 250;
    document.getElementById("item").style.left = pos + "px";
}

// Item check
function checkItem() {
    var item = document.getElementById("item").offsetLeft;

    if (Math.abs(playerPos - item) < 30) {
        useItem();
        moveItem();
    }
}

// Item benutzen
function useItem() {

    var r = Math.random();

    if (r < 0.33) {
        playerPos += 60;
        document.getElementById("feedback").innerText = "🚀 Turbo Boost!";
    }
    else if (r < 0.66) {
        enemySpeed = 1;
        document.getElementById("feedback").innerText = "🐌 Gegner langsam!";
    }
    else {
        playerPos += 100;
        document.getElementById("feedback").innerText = "💥 Mega Boost!";
    }

    updatePositions();
}

// Aufgabe
function newQuestion() {

    var max = 5 + level * 5;

    var a = Math.floor(Math.random()*max);
    var b = Math.floor(Math.random()*max);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [];
    answers.push(correct);

    while (answers.length < 4) {
        var wrong = correct + Math.floor(Math.random()*6) - 3;
        if (wrong >= 0 && answers.indexOf(wrong) === -1) {
            answers.push(wrong);
        }
    }

    answers.sort(function(){ return Math.random() - 0.5; });

    var box = document.getElementById("answers");
    box.innerHTML = "";

    for (var i = 0; i < answers.length; i++) {
        var btn = document.createElement("button");
        btn.innerText = answers[i];

        btn.onclick = (function(v){
            return function(){
                check(v);
            };
        })(answers[i]);

        box.appendChild(btn);
    }
}

// Antwort
function check(v) {

    if (v === correct) {

        combo++;
        playerPos += 30;

        document.getElementById("feedback").innerText = "🎉 Super Nino!";

        if (combo >= 3) {
            playerPos += 60;
            document.getElementById("feedback").innerText = "🚀 TURBO!";
            combo = 0;
        }

        if (playerPos >= 300) {
            document.getElementById("feedback").innerText = "🏆 Du hast gewonnen Nino!!!";
            reset();
        }

    } else {
        combo = 0;
        document.getElementById("feedback").innerText = "😅 Versuch nochmal!";
    }

    document.getElementById("combo").innerText = combo;

    updatePositions();

    setTimeout(newQuestion, 800);
}

// Reset
function reset() {
    playerPos = 0;
    enemyPos = 0;
    combo = 0;
    moveItem();
    updatePositions();
}

</script>

</body>
</html>
