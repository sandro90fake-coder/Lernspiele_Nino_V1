<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Spiel</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#4facfe, #00f2fe);
    color: white;
    overflow:hidden;
}

.track {
    width: 90%;
    height: 180px;
    background: #333;
    margin: 20px auto;
    border-radius: 20px;
    position: relative;
}

.player {
    position: absolute;
    left: 0px;
    top: 20px;
    font-size: 80px;
}

.finish {
    position: absolute;
    right: 10px;
    top: 60px;
    font-size: 40px;
}

#question {
    font-size: 60px;
    font-weight: bold;
}

/* Buttons /
button {
    font-size: 28px;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    background: orange;
    border: none;
    color: white;
}

button:hover {
    background: red;
}

/ Sterne /
#stars {
    font-size: 30px;
}

/ Konfetti */
.confetti {
    position: absolute;
    font-size: 25px;
    animation: fall 2s linear forwards;
}

@keyframes fall {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(500px); }
}
</style>

</head>

<body>

<h1>🚜💥 Ninos Lern-Spiel ⭐</h1>

<div id="menu">
    <button onclick="startLevel()">⭐ Level 1 starten</button>
</div>

<div id="game" style="display:none;">

<div class="track">
    <div id="player" class="player">🚜</div>
    <div class="finish">🏁</div>
</div>

<p id="question"></p>
<div id="answers"></div>

<p id="feedback"></p>
<p id="stars">⭐ Sterne: 0</p>

<button onclick="location.reload()">⬅ Menü</button>

</div>

<script>

var correct = 0;
var stars = 0;

// Start
function startLevel() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
    newQuestion();
}

// Aufgabe
function newQuestion() {

    var a = Math.floor(Math.random()*10);
    var b = Math.floor(Math.random()*10);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [correct];

    while (answers.length < 4) {
        var wrong = correct + Math.floor(Math.random()*6)-3;
        if (wrong >= 0 && !answers.includes(wrong)) {
            answers.push(wrong);
        }
    }

    answers.sort(function(){ return Math.random() - 0.5; });

    var box = document.getElementById("answers");
    box.innerHTML = "";

    for (var i = 0; i < answers.length; i++) {
        var btn = document.createElement("button");
        btn.innerText = answers[i];

        btn.onclick = (function(v){
            return function(){
                check(v);
            };
        })(answers[i]);

        box.appendChild(btn);
    }
}

// Antwort prüfen
function check(v) {

    if (v === correct) {

        // ⭐ normaler Stern
        stars++;

        // 🎁 Bonus Zufall
        if (Math.random() < 0.3) {
            stars++;
            document.getElementById("feedback").innerText =
                "🎁 BONUS Stern!!!";
        } else {

            // zufällige Kinder-Nachrichten
            var texts = ["🎉 SUPER!", "🚀 WOW!", "💥 MEGA!", "👏 TOLL Nino!"];
            var t = texts[Math.floor(Math.random()*texts.length)];

            document.getElementById("feedback").innerText = t;
        }

        document.getElementById("stars").innerText =
            "⭐ Sterne: " + stars;

        // 🎊 Konfetti
        createConfetti();

        // 🏆 Level geschafft
        if (stars >= 5) {
            document.getElementById("feedback").innerText =
                "🏆 DU BIST EIN CHAMPION!!!";
            stars = 0;
        }

    } else {

        document.getElementById("feedback").innerText =
            "😅 Versuch nochmal!";
    }

    setTimeout(newQuestion, 800);
}

// 🎊 Konfetti Funktion
function createConfetti() {

    for (var i=0; i<10; i++) {
        var el = document.createElement("div");
        el.innerText = "🎈";
        el.className = "confetti";

        el.style.left = Math.random()*window.innerWidth + "px";

        document.body.appendChild(el);

        setTimeout(function(e){
            e.remove();
        }, 2000, el);
    }
}

</script>

</body>
</html>
