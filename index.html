<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Rennen</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

.track {
    width: 90%;
    height: 120px;
    background: #444;
    margin: 20px auto;
    border-radius: 20px;
    position: relative;
}

.truck {
    position: absolute;
    left: 0;
    top: 30px;
    font-size: 60px;
    transition: left 0.3s;
}

.finish {
    position: absolute;
    right: 10px;
    top: 30px;
    font-size: 40px;
}

button {
    font-size: 22px;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>🚚 Ninos Rennen 🏁</h1>

<div class="track">
    <div id="truck" class="truck">🚚</div>
    <div class="finish">🏁</div>
</div>

<p id="question">Lade...</p>
<div id="answers"></div>
<p id="feedback"></p>
<p>🔥 Combo: <span id="combo">0</span></p>

<script>

let correctAnswer = 0;
let combo = 0;
let position = 0;

// FEHLER-INFO (falls etwas schiefgeht)
window.onerror = function(msg) {
    document.getElementById("question").innerText =
        "⚠️ Fehler im Code!";
};

function newQuestion() {
    try {

        let a = Math.floor(Math.random() * 10);
        let b = Math.floor(Math.random() * 10);

        correctAnswer = a + b;

        document.getElementById("question").innerText =
            a + " + " + b + " = ?";

        let answers = [];
        answers.push(correctAnswer);

        while (answers.length < 4) {
            let wrong = correctAnswer + Math.floor(Math.random()*6) - 3;
            if (wrong >= 0 && !answers.includes(wrong)) {
                answers.push(wrong);
            }
        }

        // mischen
        answers.sort(() => Math.random() - 0.5);

        let container = document.getElementById("answers");
        container.innerHTML = "";

        answers.forEach(function(value) {

            let btn = document.createElement("button");
            btn.innerText = value;

            btn.onclick = function() {
                checkAnswer(value);
            };

            container.appendChild(btn);
        });

    } catch(e) {
        document.getElementById("question").innerText =
            "⚠️ Fehler beim Laden!";
    }
}

function checkAnswer(value) {

    let truck = document.getElementById("truck");

    if (value === correctAnswer) {

        combo++;
        position += 10;

        document.getElementById("feedback").innerText = "✅ Richtig!";

        truck.style.left = position + "%";

        // TURBO
        if (combo >= 3) {
            position += 15;
            document.getElementById("feedback").innerText = "🚀 TURBO!";
            combo = 0;
        }

        // Ziel
        if (position >= 80) {
            document.getElementById("feedback").innerText = "🏆 Gewonnen!";
            position = 0;
        }

    } else {
        combo = 0;
        document.getElementById("feedback").innerText = "❌ Falsch!";
    }

    document.getElementById("combo").innerText = combo;

    setTimeout(newQuestion, 800);
}

newQuestion();

</script>

</body>
</html>
