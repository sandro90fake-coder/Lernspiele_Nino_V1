<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Mega Spiel</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#4facfe, #00f2fe);
    color: white;
}

/* Strecke /
.track {
    width: 90%;
    height: 180px;
    background: #333;
    margin: 20px auto;
    border-radius: 20px;
    position: relative;
}

/ Fahrzeuge */
.player {
    position: absolute;
    left: 0px;
    top: 20px;
    font-size: 80px;
}

.enemy {
    position: absolute;
    left: 0px;
    top: 100px;
    font-size: 70px;
}

.finish {
    position: absolute;
    right: 10px;
    top: 60px;
    font-size: 40px;
}

#question {
    font-size: 60px;
    font-weight: bold;
}

button {
    font-size: 26px;
    margin: 10px;
    padding: 12px;
}

#achievements {
    margin-top: 10px;
    font-size: 20px;
}
</style>

</head>

<body>

<h1>🚜💥 Ninos Mega Spiel 🏁</h1>

<!-- MENU -->
<div id="menu">
    <h2>Level wählen</h2>
    <button onclick="startLevel(1)">⭐ Level 1</button>
    <button onclick="startLevel(2)">🏁 Level 2</button>
    <button onclick="startLevel(3)">🔥 Level 3</button>

    <h2>Fahrzeug</h2>
    <div id="cars"></div>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div class="finish">🏁</div>
</div>

<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>

<p id="stars">⭐ Sterne: 0</p>

<div id="achievements"></div>

<button onclick="location.reload()">⬅ Menü</button>

</div>

<script>

var correct = 0;
var level = 1;
var stars = 0;

var playerPos = 0;
var enemyPos = 0;
var enemySpeed = 2;

var currentCar = "🚜";
var unlockedCars = ["🚜"];

var achievements = [];

// --- GAME LOOP ---
setInterval(function () {

    if (level > 1) {
        enemyPos += enemySpeed;
        document.getElementById("enemy").style.left = enemyPos + "px";

        if (enemyPos > 300) {
            document.getElementById("feedback").innerText = "😱 Gegner gewinnt!";
            reset();
        }
    }

    document.getElementById("player").style.left = playerPos + "px";

}, 100);

// --- START LEVEL ---
function startLevel(l){

    level = l;
    stars = 0;
    playerPos = 0;
    enemyPos = 0;

    if (level === 1) {
        document.getElementById("enemy").style.display = "none";
    } else {
        document.getElementById("enemy").style.display = "block";
    }

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    document.getElementById("player").innerText = currentCar;

    newQuestion();
}

// --- CARS ---
function renderCars(){

    var div = document.getElementById("cars");
    div.innerHTML = "";

    unlockedCars.forEach(function(car){
        var btn = document.createElement("button");
        btn.innerText = car;
        btn.onclick = function(){
            currentCar = car;
        };
        div.appendChild(btn);
    });
}

renderCars();

// --- ACHIEVEMENTS ---
function addAchievement(text){
    if (!achievements.includes(text)){
        achievements.push(text);

        var div = document.getElementById("achievements");
        div.innerHTML += "<div>🏆 " + text + "</div>";
    }
}

// --- QUESTION ---
function newQuestion(){

    var max = 5 + level * 5;

    var a = Math.floor(Math.random()*max);
    var b = Math.floor(Math.random()*max);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [correct];

    while (answers.length < 4){
        var wrong = correct + Math.floor(Math.random()*6)-3;
        if (wrong >= 0 && !answers.includes(wrong)){
            answers.push(wrong);
        }
    }

    answers.sort(function(){ return Math.random()-0.5; });

    var box = document.getElementById("answers");
    box.innerHTML = "";

    answers.forEach(function(val){
        var btn = document.createElement("button");
        btn.innerText = val;
        btn.onclick = function(){ check(val); };
        box.appendChild(btn);
    });
}

// --- CHECK ---
function check(v){

    if (v === correct){

        if (level === 1){
            stars++;
            document.getElementById("stars").innerText = "⭐ Sterne: " + stars;

            document.getElementById("feedback").innerText = "🎉 Super Nino!";

            if (stars === 1) addAchievement("Erster Stern ⭐");

            if (stars === 5){
                addAchievement("Sternensammler ⭐⭐⭐⭐⭐");
                unlockCar("🚙");
            }

        } else {

            playerPos += 30;

            if (playerPos > 300){
                addAchievement("Rennen gewonnen 🏁");
                unlockCar("🚓");
                document.getElementById("feedback").innerText = "🏆 GEWONNEN!";
                reset();
            }
        }

    } else {
        document.getElementById("feedback").innerText = "😅 Versuch nochmal!";
    }

    setTimeout(newQuestion, 800);
}

// --- UNLOCK CAR ---
function unlockCar(car){
    if (!unlockedCars.includes(car)){
        unlockedCars.push(car);
        renderCars();

        document.getElementById("feedback").innerText =
            "🎁 Neues Fahrzeug freigeschaltet! " + car;
    }
}

// --- RESET ---
function reset(){
    playerPos = 0;
    enemyPos = 0;
}

</script>

</body>
</html>
