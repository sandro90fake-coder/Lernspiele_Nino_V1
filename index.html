<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ninos Monster Truck Spiel</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #4facfe;
    color: white;
}

.track {
    width: 90%;
    height: 180px;
    background: #333;
    margin: 20px auto;
    border-radius: 20px;
    position: relative;
}

/* Trucks /
.player {
    position: absolute;
    left: 0px;
    top: 20px;
    font-size: 80px;
}

.enemy {
    position: absolute;
    left: 0px;
    top: 100px;
    font-size: 70px;
}

/ Ziel /
.finish {
    position: absolute;
    right: 10px;
    top: 60px;
    font-size: 40px;
}

/ Item /
.item {
    position: absolute;
    top: 70px;
    font-size: 45px;
}

/ Frage /
#question {
    font-size: 60px;
    font-weight: bold;
}

/ Buttons */
button {
    font-size: 28px;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
}
</style>

</head>

<body>

<h1>🚜💥 Ninos Monster Truck Rennen 🏁</h1>

<!-- Menü -->
<div id="menu">
    <h2>Wähle Level</h2>
    <button onclick="startLevel(1)">Level 1 (lernen)</button>
    <button onclick="startLevel(2)">Level 2</button>
    <button onclick="startLevel(3)">Level 3</button>
</div>

<!-- Spiel -->
<div id="game" style="display:none;">

<div class="track">
    <div id="player" class="player">🚜</div>
    <div id="enemy" class="enemy">🚗</div>
    <div id="item" class="item">🎁</div>
    <div class="finish">🏁</div>
</div>

<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>

<button onclick="location.reload()">⬅ Menü</button>

</div>

<script>

var correct = 0;
var playerPos = 0;
var enemyPos = 0;
var level = 1;
var enemySpeed = 2;

// GAME LOOP (stabil!)
setInterval(function() {

    // 👉 Gegner NUR ab Level 2
    if (level > 1) {
        enemyPos += enemySpeed;
        document.getElementById("enemy").style.left = enemyPos + "px";

        if (enemyPos > 300) {
            document.getElementById("feedback").innerText = "😱 Gegner gewinnt!";
            reset();
        }
    }

    // Spieler immer
    document.getElementById("player").style.left = playerPos + "px";

    checkItem();

}, 100);

// Start
function startLevel(l) {

    level = l;

    if (level === 1) enemySpeed = 0;
    if (level === 2) enemySpeed = 2;
    if (level === 3) enemySpeed = 3.5;

    playerPos = 0;
    enemyPos = 0;

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    // Gegner verstecken bei Level 1
    if (level === 1) {
        document.getElementById("enemy").style.display = "none";
    } else {
        document.getElementById("enemy").style.display = "block";
    }

    moveItem();
    newQuestion();
}

// Item platzieren
function moveItem() {
    var trackWidth = 300;
    var pos = Math.random() * trackWidth;
    document.getElementById("item").style.left = pos + "px";
}

// ✅ BESSERER ITEM CHECK
function checkItem() {

    var itemPos = document.getElementById("item").offsetLeft;

    // größerer Trefferbereich
    if (playerPos > itemPos - 20 && playerPos < itemPos + 20) {
        useItem();
        moveItem();
    }
}

// Item Effekt
function useItem() {

    var r = Math.random();

    if (r < 0.5) {
        playerPos += 60;
        document.getElementById("feedback").innerText = "🚀 Turbo!";
    } else {
        playerPos += 100;
        document.getElementById("feedback").innerText = "💥 Mega Boost!";
    }
}

// Aufgabe
function newQuestion() {

    var max = 5 + level * 5;

    var a = Math.floor(Math.random()*max);
    var b = Math.floor(Math.random()*max);

    correct = a + b;

    document.getElementById("question").innerText =
        a + " + " + b + " = ?";

    var answers = [correct];

    while (answers.length < 4) {
        var wrong = correct + Math.floor(Math.random()*6)-3;
        if (wrong >= 0 && answers.indexOf(wrong) === -1) {
            answers.push(wrong);
        }
    }

    answers.sort(function(){ return Math.random() - 0.5; });

    var box = document.getElementById("answers");
    box.innerHTML = "";

    for (var i=0;i<answers.length;i++) {

        var btn = document.createElement("button");
        btn.innerText = answers[i];

        btn.onclick = (function(v){
            return function(){
                check(v);
            };
        })(answers[i]);

        box.appendChild(btn);
    }
}

// Antwort
function check(v) {

    if (v === correct) {
        playerPos += 30;
        document.getElementById("feedback").innerText = "🎉 Super Nino!";
    } else {
        document.getElementById("feedback").innerText = "😅 Versuch nochmal!";
    }

    if (playerPos > 300) {
        document.getElementById("feedback").innerText = "🏆 Gewonnen!";
        reset();
    }

    setTimeout(newQuestion, 800);
}

// Reset
function reset() {
    playerPos = 0;
    enemyPos = 0;
    moveItem();
}

</script>

</body>
</html>
